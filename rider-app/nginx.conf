# Kasi — rider-app-web (Flutter web statique)
#
# Sert uniquement les fichiers buildes (flutter build web). Ne doit JAMAIS
# proxifier vers un autre service — voir apps/admin-panel/nginx.conf pour
# le contexte complet du bug (boucle sur soi-meme) que ce fichier evite.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        application/wasm;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-XSS-Protection       "0" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
