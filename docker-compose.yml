# =============================================================================
# Kasi — Stack Docker Compose
#
# Services : postgres (PostGIS 16), redis 7, admin-api, driver-api, rider-api,
#            admin-panel (Angular + nginx interne), nginx (reverse proxy).
# Point d entree unique : http://localhost (port 80)
#   /            -> admin-panel:80  (proxy)
#   /admin-api/  -> admin-api:3000
#   /driver-api/ -> driver-api:3002
#   /rider-api/  -> rider-api:3001
#
# Prerequis : copier .env.example en .env et renseigner les variables.
# Demarrage  : docker compose up --build
# =============================================================================

# -----------------------------------------------------------------------------
# Reseau interne — tous les conteneurs communiquent via ce bridge Docker.
# Les services ne sont pas accessibles depuis l exterieur sauf via les ports
# explicitement exposes ci-dessous.
# -----------------------------------------------------------------------------
networks:
  kasi-net:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes nommes — les donnees persistent entre les recreations de conteneurs.
# -----------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

services:

  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  postgres:
    image: postgis/postgis:16-3.4
    container_name: kasi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kasi}
      POSTGRES_USER: ${DB_USER:-kasi}
      POSTGRES_PASSWORD: ${DB_PASS:-CHANGEME_kasi}
    ports:
      - "127.0.0.1:5433:5432"     # Hote 5433 : un PostgreSQL natif Windows occupe 5432 sur la machine de dev (pgAdmin -> localhost:5433)
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kasi-net
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${DB_USER:-kasi} -d ${DB_NAME:-kasi}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kasi-redis
    restart: unless-stopped
    # requirepass active l authentification Redis (obligatoire hors localhost)
    command: redis-server --requirepass ${REDIS_PASSWORD:-CHANGEME_redis}
    ports:
      - "127.0.0.1:6379:6379"     # Expose localement pour redis-cli / debug
    volumes:
      - redis-data:/data
    networks:
      - kasi-net
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD:-CHANGEME_redis}
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # APIs NestJS
  # Contexte de build = racine du monorepo (app-ridy/) car les Dockerfiles
  # copient package.json, nx.json, tsconfig.base.json depuis cette racine.
  # ===========================================================================

  admin-api:
    # Port 3000 — GraphQL Admin (source : EXPOSE 3000 dans apps/admin-api/Dockerfile)
    # image: cible poussee par deploy.yml sur GHCR ; necessaire pour que
    # `docker compose pull` fonctionne en prod (voir .env.example : IMAGE_REGISTRY).
    # build: reste utilise en dev local via `docker compose up --build`.
    image: ${IMAGE_REGISTRY:-kasi-local}/admin-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/admin-api/Dockerfile
    container_name: kasi-admin-api
    restart: unless-stopped
    environment:
      # Port d ecoute interne — lu par apps/admin-api/src/main.ts (defaut 3000
      # si absent, ce qui coincidait avec le mapping ci-dessous, mais explicite
      # ici pour eviter la meme confusion que sur driver-api/rider-api).
      ADMIN_API_PORT: 3000
      # Base de donnees PostgreSQL + PostGIS
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-kasi}
      DB_USER: ${DB_USER:-kasi}
      DB_PASS: ${DB_PASS:-CHANGEME_kasi}
      # Redis (subscriptions GraphQL via graphql-redis-subscriptions + ioredis)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-CHANGEME_redis}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-CHANGEME_jwt_secret_32chars_minimum}
      # Firebase Admin SDK
      # A valider par kasi-integrations-auditor : garder Firebase ou remplacer ?
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    volumes:
      # Persistance de la configuration runtime (config.production.json +
      # cle de service Firebase uploadee via l ecran /config). Sans ce mount,
      # toute recreation du conteneur perd la config et l API redemarre en
      # mode "non configure" (schema GraphQL reduit a currentConfiguration).
      - ./config:/app/config
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kasi-net

  driver-api:
    # Port 3002 — GraphQL Driver (source : EXPOSE 3002 dans apps/driver-api/Dockerfile)
    image: ${IMAGE_REGISTRY:-kasi-local}/driver-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/driver-api/Dockerfile
    container_name: kasi-driver-api
    restart: unless-stopped
    environment:
      # Port d ecoute interne — lu par apps/driver-api/src/main.ts (defaut 3000
      # si absent, ce qui ne correspondait PAS au mapping "3002:3002" ci-dessous :
      # l app ecoutait sur 3000 dans le conteneur alors que seul 3002 est publie.
      DRIVER_API_PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-kasi}
      DB_USER: ${DB_USER:-kasi}
      DB_PASS: ${DB_PASS:-CHANGEME_kasi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-CHANGEME_redis}
      JWT_SECRET: ${JWT_SECRET:-CHANGEME_jwt_secret_32chars_minimum}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    volumes:
      # Meme config partagee que admin-api (FirebaseNotificationModule lit
      # /app/config/config.production.json + la cle de service).
      - ./config:/app/config
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kasi-net

  rider-api:
    # Port 3001 — GraphQL Rider (source : EXPOSE 3001 dans apps/rider-api/Dockerfile)
    image: ${IMAGE_REGISTRY:-kasi-local}/rider-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/rider-api/Dockerfile
    container_name: kasi-rider-api
    restart: unless-stopped
    environment:
      # Port d ecoute interne — meme correctif que DRIVER_API_PORT ci-dessus,
      # cf. apps/rider-api/src/main.ts (defaut 3000, mapping publie = 3001).
      RIDER_API_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-kasi}
      DB_USER: ${DB_USER:-kasi}
      DB_PASS: ${DB_PASS:-CHANGEME_kasi}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-CHANGEME_redis}
      JWT_SECRET: ${JWT_SECRET:-CHANGEME_jwt_secret_32chars_minimum}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
    volumes:
      # Meme config partagee que admin-api (FirebaseNotificationModule lit
      # /app/config/config.production.json + la cle de service).
      - ./config:/app/config
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kasi-net

  # ===========================================================================
  # Frontends
  # ===========================================================================

  admin-panel:
    # Angular 16 SPA servie par nginx:1.25.1-alpine
    # Build Nx multi-stage dans le Dockerfile ; contexte = racine monorepo
    image: ${IMAGE_REGISTRY:-kasi-local}/admin-panel:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/admin-panel/Dockerfile
      args:
        MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    container_name: kasi-admin-panel
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"       # http://localhost:8080 en dev local
    depends_on:
      - admin-api
    networks:
      - kasi-net

  # ===========================================================================
  # Reverse proxy Nginx
  # Point d entree unique HTTP pour l ensemble de la stack.
  # Routes :
  #   /            -> admin-panel:80 (proxy vers le conteneur admin-panel)
  #   /admin-api/  -> admin-api:3000
  #   /driver-api/ -> driver-api:3002
  #   /rider-api/  -> rider-api:3001
  #
  # Aucun pre-build manuel requis : le conteneur admin-panel build et sert
  # l Angular SPA en autonomie ; nginx lui proxifie simplement le trafic /.
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: kasi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # Decommenter apres provisionnement SSL
                      # Voir .nginx/ssl-placeholder.md pour le guide Let's Encrypt
    volumes:
      # Config reverse proxy (read-only — toute modification necessite nginx -s reload)
      - ./.nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Blocs location/gzip/headers partages entre les serveurs HTTP et HTTPS
      - ./.nginx/kasi-locations.conf:/etc/nginx/kasi-locations.conf:ro
      # SSL (prod uniquement) : le VPS ajoute via docker-compose.override.yml
      # le port 443, ssl-kasigroupe.conf et /etc/letsencrypt (voir
      # .nginx/ssl-kasigroupe.conf pour le contenu exact de l'override).
    depends_on:
      - admin-panel
      - admin-api
      - driver-api
      - rider-api
    networks:
      - kasi-net

  # ---------------------------------------------------------------------------
  # rider-app-web (Flutter web) — DESACTIVE par defaut
  #
  # rider-app/Dockerfile ne compile pas Flutter lui-meme : il copie uniquement
  # le dossier pre-built rider-app/build/web, produit par :
  #   cd rider-app && flutter build web --release
  #
  # Decommentez ce service seulement apres avoir execute la commande ci-dessus.
  # ---------------------------------------------------------------------------
