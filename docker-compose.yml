  #   build:
  #     context: .
  #     dockerfile: rider-app/Dockerfile
  #   container_name: kasi-rider-app-web
  #   restart: unless-stopped
  #   ports:
  #     - "8081:80"
  #   networks:
  #     - kasi-net
