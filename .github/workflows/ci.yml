name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint (affected)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for nx affected to compare against origin/main

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-lint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-lint-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json') }}-
            nx-lint-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint affected projects
        run: npx nx affected --target=lint --base=origin/main

  test:
    name: Test (affected)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-test-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-test-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json') }}-
            nx-test-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Test affected projects
        run: npx nx affected --target=test --base=origin/main --ci

  build:
    name: Build (affected, production)
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json') }}-${{ github.sha }}
          restore-keys: |
            nx-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nx.json') }}-
            nx-build-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build affected projects (production)
        run: npx nx affected --target=build --base=origin/main --configuration=production
