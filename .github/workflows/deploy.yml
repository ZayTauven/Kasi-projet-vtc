name: Deploy

# Triggered only when the CI workflow completes successfully on main.
# This guarantees lint + test + build passed before any image is shipped.
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  build-images:
    name: Build & push Docker images to GHCR
    runs-on: ubuntu-latest
    # Only run when the CI workflow actually succeeded (not just completed)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: admin-api
            dockerfile: apps/admin-api/Dockerfile
          - name: driver-api
            dockerfile: apps/driver-api/Dockerfile
          - name: rider-api
            dockerfile: apps/rider-api/Dockerfile
          - name: admin-panel
            dockerfile: apps/admin-panel/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR exige des noms d'images en minuscules ; github.repository
      # (ZayTauven/Kasi-projet-vtc) contient des majuscules.
      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service.name }}:${{ github.event.workflow_run.head_sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-images
    environment: production

    steps:
      - name: SSH into server and pull updated images
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/kasi
            # Pull the freshly built images from GHCR
            docker compose pull
            # Recreate only containers whose image changed; keep infra containers alive
            docker compose up -d --remove-orphans
            # Clean up dangling images to reclaim disk space
            docker image prune -f
