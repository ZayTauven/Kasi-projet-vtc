# Kasi — contenu partage des blocs server (HTTP dev local + HTTPS prod).
# Inclus par default.conf (server :80) et ssl-kasigroupe.conf (server :443).
# Toute modification ici s applique aux deux.

root /usr/share/nginx/html;
index index.html;

# ==========================================================================
# Compression Gzip
# ==========================================================================
gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_proxied      any;
gzip_comp_level   6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml+rss
    image/svg+xml
    font/woff
    font/woff2
    application/wasm;

# ==========================================================================
# En-tetes de securite globaux
# Herites uniquement par les location sans add_header propre (ex: location /).
# Chaque bloc proxy ci-dessous les repete pour garantir leur presence.
# ==========================================================================
add_header X-Content-Type-Options  "nosniff"    always;
add_header X-Frame-Options         "SAMEORIGIN"  always;
add_header X-XSS-Protection        "0"           always;

# ==========================================================================
# Proxy -> admin-api (port 3000)
# /admin-api/graphql -> http://admin-api:3000/graphql
# Le prefixe /admin-api/ est retire par le slash de fin dans proxy_pass.
# ==========================================================================
location /admin-api/ {

    # Preflight CORS : reponse immediate sans proxifier la requete
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
        add_header Access-Control-Max-Age           86400;
        add_header Content-Length                   0;
        return 204;
    }

    proxy_pass         http://admin-api:3000/;
    proxy_http_version 1.1;

    # WebSocket upgrade (subscriptions GraphQL)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # En-tetes de forwarding standard
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts adaptes aux longues requetes GraphQL et connexions WS
    proxy_connect_timeout  10s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # Masque les en-tetes CORS emis par l API NestJS (app.enableCors) —
    # seuls ceux ajoutes par nginx ci-dessous partent vers le navigateur.
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;

    # CORS
    add_header Access-Control-Allow-Origin      $http_origin always;
    add_header Access-Control-Allow-Credentials "true"       always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;

    # En-tetes de securite (repetes — ce bloc a ses propres add_header)
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN"  always;
    add_header X-XSS-Protection        "0"           always;
}

# ==========================================================================
# Proxy -> driver-api (port 3002)
# ==========================================================================
location /driver-api/ {

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
        add_header Access-Control-Max-Age           86400;
        add_header Content-Length                   0;
        return 204;
    }

    proxy_pass         http://driver-api:3002/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout  10s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;

    add_header Access-Control-Allow-Origin      $http_origin always;
    add_header Access-Control-Allow-Credentials "true"       always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;

    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN"  always;
    add_header X-XSS-Protection        "0"           always;
}

