# ==========================================================================
# Proxy -> admin-panel (port 80)
# Toute URL non capturee par les blocs /admin-api/, /driver-api/, /rider-api/
# est transmise au conteneur admin-panel qui gere lui-meme le SPA fallback,
# les headers de cache et la compression.
# ==========================================================================
location / {
    proxy_pass         http://admin-panel:80/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# Fallback si admin-panel ne repond pas.
error_page 404 /index.html;
