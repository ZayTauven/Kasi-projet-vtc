# Kasi — nginx reverse proxy
#
# Routes :
#   /              -> proxy -> admin-panel:80   (conteneur Angular/nginx interne)
#   /admin-api/    -> proxy -> admin-api:3000   (GraphQL + WS subscriptions)
#   /driver-api/   -> proxy -> driver-api:3002  (GraphQL + WS subscriptions)
#   /rider-api/    -> proxy -> rider-api:3001   (GraphQL + WS subscriptions)
#
# Les blocs location/gzip/headers sont factorises dans kasi-locations.conf,
# partages entre ce serveur HTTP (dev local) et le serveur HTTPS de prod
# (.nginx/ssl-kasigroupe.conf, monte uniquement sur le VPS via
# docker-compose.override.yml — voir .nginx/ssl-placeholder.md).
#
# CORS : gere au niveau nginx sur les blocs proxy.
#   Les APIs NestJS gardent app.enableCors() (utile en acces direct dev sur
#   :3000/:3001/:3002) ; leurs en-tetes CORS sont masques via
#   proxy_hide_header pour eviter les doublons (les navigateurs rejettent les
#   Access-Control-Allow-Origin en double).

# -- Mapping WebSocket upgrade -------------------------------------------------
# Necessite pour les subscriptions GraphQL (graphql-ws / subscriptions-transport-ws).
# Ce bloc map est au niveau http (les fichiers conf.d sont inclus dans http{}).
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       close;
}

server {
    listen 80;
    server_name _;

    include /etc/nginx/kasi-locations.conf;
}
