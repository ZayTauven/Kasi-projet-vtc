# Kasi — nginx reverse proxy
#
# Routes :
#   /              -> proxy -> admin-panel:80   (conteneur Angular/nginx interne)
#   /admin-api/    -> proxy -> admin-api:3000   (GraphQL + WS subscriptions)
#   /driver-api/   -> proxy -> driver-api:3002  (GraphQL + WS subscriptions)
#   /rider-api/    -> proxy -> rider-api:3001   (GraphQL + WS subscriptions)
#
# SSL : desactive par defaut.
#   Voir .nginx/ssl-placeholder.md pour activer Let's Encrypt en production.
#
# CORS : gere au niveau nginx sur les blocs proxy.
#   Les APIs NestJS gardent app.enableCors() (utile en acces direct dev sur
#   :3000/:3001/:3002) ; leurs en-tetes CORS sont masques ici via
#   proxy_hide_header pour eviter les doublons (les navigateurs rejettent les
#   Access-Control-Allow-Origin en double).
#
# En-tetes de securite : declares au niveau server pour les locations sans
#   add_header propre (location /). Repetes explicitement dans chaque location
#   qui a ses propres add_header — nginx n herite pas des add_header server
#   des que la location en definit au moins un.

# -- Mapping WebSocket upgrade -------------------------------------------------
# Necessite pour les subscriptions GraphQL (graphql-ws / subscriptions-transport-ws).
# Ce bloc map est au niveau http (les fichiers conf.d sont inclus dans http{}).
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       close;
}

server {
    listen 80;
    server_name _;

    # --------------------------------------------------------------------------
    # SSL — placeholder production (Let's Encrypt / Certbot)
    # Decommenter apres provisionnement des certificats.
    # Voir .nginx/ssl-placeholder.md pour le guide complet (max 20 lignes).
    # --------------------------------------------------------------------------
    # listen 443 ssl;
    # include /etc/nginx/ssl/kasi-ssl.conf;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================================================
    # Compression Gzip
    # ==========================================================================
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        application/wasm;

    # ==========================================================================
    # En-tetes de securite globaux
    # Herites uniquement par les location sans add_header propre (ex: location /).
    # Chaque bloc proxy ci-dessous les repete pour garantir leur presence.
    # ==========================================================================
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN"  always;
    add_header X-XSS-Protection        "0"           always;

    # ==========================================================================
    # Proxy -> admin-api (port 3000)
    # /admin-api/graphql -> http://admin-api:3000/graphql
    # Le prefixe /admin-api/ est retire par le slash de fin dans proxy_pass.
    # ==========================================================================
    location /admin-api/ {

        # Preflight CORS : reponse immediate sans proxifier la requete
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400;
            add_header Content-Length                   0;
            return 204;
        }

        proxy_pass         http://admin-api:3000/;
        proxy_http_version 1.1;

        # WebSocket upgrade (subscriptions GraphQL)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # En-tetes de forwarding standard
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts adaptes aux longues requetes GraphQL et connexions WS
        proxy_connect_timeout  10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Masque les en-tetes CORS emis par l API NestJS (app.enableCors) —
        # seuls ceux ajoutes par nginx ci-dessous partent vers le navigateur.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # CORS
        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;

        # En-tetes de securite (repetes — ce bloc a ses propres add_header)
        add_header X-Content-Type-Options  "nosniff"    always;
        add_header X-Frame-Options         "SAMEORIGIN"  always;
        add_header X-XSS-Protection        "0"           always;
    }

    # ==========================================================================
    # Proxy -> driver-api (port 3002)
    # ==========================================================================
    location /driver-api/ {

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400;
            add_header Content-Length                   0;
            return 204;
        }

        proxy_pass         http://driver-api:3002/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Masque les en-tetes CORS emis par l API NestJS (app.enableCors) —
        # seuls ceux ajoutes par nginx ci-dessous partent vers le navigateur.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;

        add_header X-Content-Type-Options  "nosniff"    always;
        add_header X-Frame-Options         "SAMEORIGIN"  always;
        add_header X-XSS-Protection        "0"           always;
    }

    # ==========================================================================
    # Proxy -> rider-api (port 3001)
    # ==========================================================================
    location /rider-api/ {

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Max-Age           86400;
            add_header Content-Length                   0;
            return 204;
        }

        proxy_pass         http://rider-api:3001/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Masque les en-tetes CORS emis par l API NestJS (app.enableCors) —
        # seuls ceux ajoutes par nginx ci-dessous partent vers le navigateur.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;

        add_header X-Content-Type-Options  "nosniff"    always;
        add_header X-Frame-Options         "SAMEORIGIN"  always;
        add_header X-XSS-Protection        "0"           always;
    }

    # ==========================================================================
    # Proxy -> admin-panel (port 80)
    # Toute URL non capturee par les blocs /admin-api/, /driver-api/, /rider-api/
    # est transmise au conteneur admin-panel qui gere lui-meme le SPA fallback,
    # les headers de cache et la compression.
    # ==========================================================================
    location / {
        proxy_pass         http://admin-panel:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Fallback si admin-panel ne repond pas.
    error_page 404 /index.html;
}
