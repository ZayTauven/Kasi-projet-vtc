# Kasi — HTTPS production (kasigroupe.tech) — NE PAS monter en dev local
# (les certificats /etc/letsencrypt n'existent que sur le VPS).
# Monte sur le VPS via /opt/kasi/docker-compose.override.yml :
#   services:
#     nginx:
#       ports: ["443:443"]
#       volumes:
#         - ./.nginx/ssl-kasigroupe.conf:/etc/nginx/conf.d/ssl.conf:ro
#         - /etc/letsencrypt:/etc/letsencrypt:ro

# Redirection HTTP -> HTTPS pour le domaine (les requetes par IP nue restent
# servies en HTTP par le serveur "_" de default.conf).
server {
    listen 80;
    server_name kasigroupe.tech www.kasigroupe.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name kasigroupe.tech www.kasigroupe.tech;

    ssl_certificate     /etc/letsencrypt/live/kasigroupe.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kasigroupe.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:KASI_SSL:10m;
    ssl_session_timeout 1h;

    include /etc/nginx/kasi-locations.conf;
}
