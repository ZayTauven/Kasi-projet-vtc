name: client_shared
description: A new Flutter module project.

version: 1.0.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dotted_line: ^3.1.0
  flutter:
    sdk: flutter
  google_fonts: ^6.3.3
  flutter_map: ^8.3.1
  flutter_map_animations: ^0.10.0
  flutter_vector_icons: ^2.0.0
  http: ^1.1.0
  latlong2: ^0.10.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/illustrations/

  module:
    androidX: true
    androidPackage: com.example.client_shared
    iosBundleIdentifier: com.example.clientShared
