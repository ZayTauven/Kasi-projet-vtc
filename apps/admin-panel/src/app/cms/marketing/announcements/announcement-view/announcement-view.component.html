<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'announcement.title' | translate }}</h1>
    <p>{{ 'announcement.subtitle' | translate }}</p>
  </div>
</div>
<div class="kasi-card">
  <div class="kasi-card__body">
    <form nz-form class="kasi-form" nzLayout="vertical" [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="kasi-form--grid kasi-form--3">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="title">{{ 'profile.title' | translate }}</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="title" id="title">
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzFor="userType">{{ 'profile.userType' | translate }}</nz-form-label>
          <nz-form-control>
            <nz-select [nzMaxTagCount]="3" nzMode="default" [nzPlaceHolder]="'profile.pleaseSelect' | translate" formControlName="userType">
              <nz-option [nzLabel]="'profile.driver' | translate" nzValue="Driver"></nz-option>
              <nz-option [nzLabel]="'profile.rider' | translate" nzValue="Rider"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzRequired nzFor="description">{{ 'profile.description' | translate }}</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="description" id="description">
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzFor="url">{{ 'profile.url' | translate }}</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="url" id="url">
          </nz-form-control>
        </nz-form-item>
        <nz-form-item>
          <nz-form-label nzRequired nzFor="dates">{{ 'coupons.availabilityTime' | translate }}</nz-form-label>
          <nz-form-control>
            <nz-range-picker id="dates" formControlName="dates" class="w-full"></nz-range-picker>
          </nz-form-control>
        </nz-form-item>
      </div>
    </form>
    <div class="kasi-form-actions">
      <button *ngIf="form.value.id != null" nz-button nzDanger type="button" (click)="deleteAnnouncement()">{{'profile.delete' | translate}}</button>
      <button nz-button nzType="primary" [disabled]="form.invalid" type="button" (click)="onSubmit()">{{ 'profile.saveChanges' | translate }}</button>
    </div>
  </div>
</div>
