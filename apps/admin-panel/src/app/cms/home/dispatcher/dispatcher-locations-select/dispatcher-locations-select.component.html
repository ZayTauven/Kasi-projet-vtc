<!-- Geocoding autocomplete — uses Mapbox REST, emits { lat, lng } -->
<mapbox-places-autocomplete
  (setAddress)="getAddress($event)"
  adressType="geocode">
</mapbox-places-autocomplete>

<mgl-map
  style="height: 700px; width: 100%;"
  [style]="'mapbox://styles/mapbox/streets-v12'"
  [zoom]="[4]"
  [center]="[0, 20]"
  (mapLoad)="onMapLoad($event)"
  (mapClick)="mapClicked($event)">

  <!-- Driver markers -->
  <mgl-marker
    *ngFor="let driver of drivers"
    [lngLat]="[driver.location.lng, driver.location.lat]">
    <img src="assets/marker_taxi.png"
         style="width: 32px; height: 32px;"
         [attr.title]="driver.driverId">
  </mgl-marker>

  <!-- Trip-point markers — order matches points[] array -->
  <mgl-marker
    *ngFor="let point of points"
    [lngLat]="[point.location.lng, point.location.lat]">
    <img src="assets/marker_pickup.png"
         style="width: 32px; height: 32px;"
         [attr.title]="point.address">
  </mgl-marker>
</mgl-map>

<nz-card>
  <nz-timeline class="pt-16">
    <nz-timeline-item *ngFor="let point of points">{{ point.address }}</nz-timeline-item>
  </nz-timeline>
</nz-card>

<button nz-button nzDanger (click)="removeLastPoint()" style="margin-top: 8px; margin-right: 4px;">
  <span>{{ 'dispatcher.removeLastPoint' | translate }}</span>
</button>
<button nz-button nzType="default" (click)="goToServiceSelection()"
  [disabled]="points.length === 0" style="margin-top: 8px;">
  <span>{{ 'profile.next' | translate }}</span>
</button>
