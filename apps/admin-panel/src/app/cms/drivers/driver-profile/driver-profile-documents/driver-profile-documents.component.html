@if ((query | async)?.data?.driver; as driver) {
  <div class="kasi-card">
    <div class="kasi-card__body" style="overflow: auto;">
      <nz-upload nzListType="picture-card" [nzFileList]="files" [nzShowButton]="false" [nzPreview]="handlePreview"
        [nzShowUploadList]="{showRemoveIcon: false, showPreviewIcon: true, showDownloadIcon: true}">
        <div>
          <span nz-icon nzType="plus"></span>
          <div style="margin-top: 8px">{{ 'profile.upload' | translate }}</div>
        </div>
      </nz-upload>
      <nz-modal [nzVisible]="previewVisible" [nzContent]="modalContent" [nzFooter]="null"
        (nzOnCancel)="previewVisible = false">
        <ng-template #modalContent>
          <img [src]="previewImage" [ngStyle]="{ width: '100%' }" />
        </ng-template>
      </nz-modal>
    </div>
  </div>
}
