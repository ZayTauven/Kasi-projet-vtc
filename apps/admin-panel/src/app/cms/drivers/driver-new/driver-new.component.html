<nz-page-header [nzGhost]="false" nzBackIcon [nzTitle]="'form.newDriver.title' | translate" [nzSubtitle]="'form.newDriver.subtitle' | translate">
</nz-page-header>
<nz-card [nzActions]="[tmplActions]" style="mt-16">
  <form nz-form [formGroup]="form" (ngSubmit)="submitForm()">
    <nz-form-item>
      <nz-form-label nzRequired nzFor="firstName">{{ 'profile.firstName' | translate }}</nz-form-label>
      <nz-form-control [nzErrorTip]="'form.notValidFirstName' | translate">
        <input nz-input formControlName="firstName" id="firstName" required />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="lastName">{{ 'profile.lastName' | translate }}</nz-form-label>
      <nz-form-control [nzErrorTip]="'form.notValidLastName' | translate">
        <input nz-input formControlName="lastName" id="lastName" required />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="phoneNumber" nzRequired>{{ 'profile.phoneNumber' | translate }}</nz-form-label>
      <nz-form-control formGroupName="phoneNumber">
        <nz-input-group [nzAddOnBefore]="addOnBeforeTemplate">
          <ng-template #addOnBeforeTemplate>
            <nz-select formControlName="prefix" class="phone-select">
              <nz-option *ngFor="let code of countryCodes" [nzLabel]="code.name + ' (' + code.dial_code + ')'"
                [nzValue]="code.dial_code"></nz-option>
            </nz-select>
          </ng-template>
          <input formControlName="number" id="phoneNumber" type=”tel” nz-input required />
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="gender">{{ 'profile.gender' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-select formControlName="gender">
          <nz-option [nzLabel]="'enum.gender.male' | translate" nzValue="Male"></nz-option>
          <nz-option [nzLabel]="'enum.gender.female' | translate" nzValue="Female"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>
    <ng-template #tmplActions>
      <button nz-button nzType="primary" [disabled]="form.invalid" (click)="submitForm()">{{ 'form.register' | translate }}</button>
    </ng-template>
  </form>
</nz-card>
