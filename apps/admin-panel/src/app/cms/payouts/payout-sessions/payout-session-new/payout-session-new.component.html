<nz-page-header [nzGhost]="false" nzBackIcon [nzTitle]="'payoutSessionNew.title' | translate"
  [nzSubtitle]="'payoutSessionNew.subtitle' | translate">
</nz-page-header>
<nz-card [nzActions]="[tmplActions]" style="mt-16">
  <form nz-form [formGroup]="form">
    <nz-form-item>
      <nz-form-label nzRequired nzFor="currency">{{ 'profile.currency' | translate }}</nz-form-label>
      <nz-form-control>
        <input nz-input formControlName="currency" id="currency" placeholder="XOF" maxlength="3"
          style="width: 120px; text-transform: uppercase;" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="minimumAmount">{{ 'payouts.minimumAmount' | translate }}</nz-form-label>
      <nz-form-control [nzExtra]="'payouts.minimumAmountHint' | translate">
        <nz-input-number formControlName="minimumAmount" id="minimumAmount" [nzMin]="0" [nzStep]="500"
          style="width: 160px;"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="methodIds">{{ 'payouts.targetMethods' | translate }}</nz-form-label>
      <nz-form-control [nzExtra]="'payouts.targetMethodsHint' | translate">
        <nz-select nzMode="multiple" [nzPlaceHolder]="'payouts.allMethods' | translate" formControlName="methodIds"
          style="min-width: 260px;">
          <nz-option *ngFor="let method of methods | async" [nzLabel]="method.name + ' (' + method.currency + ')'"
            [nzValue]="method.id"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="description">{{ 'profile.description' | translate }}</nz-form-label>
      <nz-form-control>
        <input nz-input formControlName="description" id="description" />
      </nz-form-control>
    </nz-form-item>
    <nz-alert *ngIf="preview" nzType="info" nzShowIcon class="mb-4"
      [nzMessage]="('payouts.previewResult' | translate: { count: preview.eligibleCount }) + ' — ' + (preview.totalAmount | currency: preview.currency)">
    </nz-alert>
    <ng-template #tmplActions>
      <nz-space>
        <button *nzSpaceItem nz-button [nzLoading]="loading" [disabled]="form.invalid" (click)="onPreview()">{{
          'payouts.preview' | translate }}</button>
        <button *nzSpaceItem nz-button nzType="primary" [nzLoading]="loading" [disabled]="form.invalid"
          (click)="onSubmit()">{{ 'payouts.createSession' | translate }}</button>
      </nz-space>
    </ng-template>
  </form>
</nz-card>
