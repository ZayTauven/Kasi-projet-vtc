<!-- En-tête de page -->
<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'zonePrices.title' | translate }}</h1>
    <p>{{ 'zonePrices.subtitle' | translate }}</p>
  </div>
  <button class="kasi-btn kasi-btn--primary" routerLink="new">
    <i nz-icon nzType="plus"></i>{{ 'profile.add' | translate }}
  </button>
</div>

<!-- Carte tableau -->
<div class="kasi-card">
  <div class="kasi-card__body kasi-card__body--flush">
    @if ((query | async)?.data?.zonePrices; as zonePrices) {
      <nz-table #ajaxTable nzShowSizeChanger [nzFrontPagination]="false"
        [nzData]="zonePrices.nodes"
        [nzTotal]="zonePrices.totalCount">
        <thead>
          <tr>
            <th>{{ 'profile.name' | translate }}</th>
          </tr>
        </thead>
        <tbody>
          @for (data of ajaxTable.data; track data) {
            <tr [routerLink]="'view/' + data.id" class="group cursor-pointer">
              <td>{{ data.name }}</td>
            </tr>
          }
        </tbody>
      </nz-table>
    }
  </div>
</div>
