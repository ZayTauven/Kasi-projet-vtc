<!-- En-tête de page -->
<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'users.title' | translate }}</h1>
    <p>{{ 'users.subtitle' | translate }}</p>
  </div>
  <button class="kasi-btn kasi-btn--primary" routerLink="new">
    <i nz-icon nzType="plus"></i>{{ 'profile.add' | translate }}
  </button>
</div>

<!-- Carte tableau -->
<div class="kasi-card">
  <div class="kasi-card__body kasi-card__body--flush">
    <nz-table #table nzShowSizeChanger [nzFrontPagination]="false" *ngIf="(query | async)?.data?.operators as operators"
      [nzData]="operators.nodes" [nzTotal]="operators.totalCount"
      (nzQueryParams)="tableService.onTableQueryParamsChange($event)">
      <thead>
        <tr>
          <th>{{ 'profile.name' | translate }}</th>
          <th>{{ 'profile.userName' | translate }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of table.data" [routerLink]="'view/' + data.id" class="group cursor-pointer">
          <td>
            <div class="flex items-center ml-2">
              <div>
                <div class="table-first-line">
                  {{ data.firstName }} {{ data.lastName }}
                </div>
                <div class="table-second-line">
                  {{ data.role?.title ?? ('users.noRole' | translate) }}
                </div>
              </div>
            </div>
          </td>
          <td>{{ data.userName }}</td>
        </tr>
      </tbody>
    </nz-table>
  </div>
</div>
