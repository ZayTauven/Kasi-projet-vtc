<!-- En-tête de page -->
<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'regions.title' | translate }}</h1>
    <p>{{ 'regions.subtitle' | translate }}</p>
  </div>
  <button class="kasi-btn kasi-btn--primary" routerLink="new">
    <i nz-icon nzType="plus"></i>{{ 'profile.add' | translate }}
  </button>
</div>

<!-- Carte tableau -->
<div class="kasi-card">
  <div class="kasi-card__body kasi-card__body--flush">
    <nz-table #ajaxTable nzShowSizeChanger [nzFrontPagination]="false" *ngIf="(query | async)?.data?.regions as regions"
      [nzData]="regions.nodes" [nzTotal]="regions.totalCount">
      <thead>
        <tr>
          <th>{{ 'profile.name' | translate }}</th>
          <th>{{ 'profile.currency' | translate }}</th>
          <th>{{ 'profile.status' | translate }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of ajaxTable.data" [routerLink]="'view/' + data.id" class="group cursor-pointer">
          <td>{{ data.name }}</td>
          <td>{{ data.currency }}</td>
          <td>
            <nz-tag [nzColor]="tagColor.boolean(data.enabled)">{{data.enabled ? ('profile.enabled' | translate) : ('profile.disabled' | translate)}}</nz-tag>
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>
</div>
