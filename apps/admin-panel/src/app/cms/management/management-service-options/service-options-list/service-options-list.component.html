<!-- En-tête de page -->
<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'serviceOptions.title' | translate }}</h1>
    <p>{{ 'serviceOptions.subtitle' | translate }}</p>
  </div>
  <button class="kasi-btn kasi-btn--primary" routerLink="new">
    <i nz-icon nzType="plus"></i>{{ 'profile.add' | translate }}
  </button>
</div>

<!-- Carte tableau -->
<div class="kasi-card">
  <div class="kasi-card__body kasi-card__body--flush">
    <nz-table #ajaxTable nzShowSizeChanger [nzFrontPagination]="false"
      *ngIf="(query | async)?.data?.serviceOptions as serviceOptions" [nzData]="serviceOptions"
      [nzTotal]="serviceOptions.length">
      <thead>
        <tr>
          <th>{{ 'profile.name' | translate }}</th>
          <th>{{ 'profile.type' | translate }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of ajaxTable.data" [routerLink]="'view/' + data.id" class="group cursor-pointer">
          <td>{{ data.name }}</td>
          <td>
            {{ data.type }} • {{ data.icon }}
          </td>
        </tr>
      </tbody>
    </nz-table>
  </div>
</div>
