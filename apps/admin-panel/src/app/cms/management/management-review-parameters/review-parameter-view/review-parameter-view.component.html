<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'reviewParameter.title' | translate }}</h1>
    <p>{{ 'reviewParameter.subtitle' | translate }}</p>
  </div>
</div>
<div class="kasi-card">
  <div class="kasi-card__body">
    <form nz-form class="kasi-form kasi-form--grid" [formGroup]="form" (ngSubmit)="onSubmit()">
    <input formControlName="id" type="hidden" hidden>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="title">{{ 'profile.title' | translate }}</nz-form-label>
      <nz-form-control [nzErrorTip]="'error.nameInvalid' | translate">
        <input nz-input formControlName="title" id="title" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="isGood" nzRequired>{{ 'reviewParameter.isGood' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-switch formControlName="isGood" id="isGood"></nz-switch>
      </nz-form-control>
    </nz-form-item>

    </form>
    <div class="kasi-form-actions">
      <button nz-button nzType="primary" [disabled]="form.invalid" (click)="onSubmit()">{{ 'profile.saveChanges' | translate }}</button>
    </div>
  </div>
</div>
