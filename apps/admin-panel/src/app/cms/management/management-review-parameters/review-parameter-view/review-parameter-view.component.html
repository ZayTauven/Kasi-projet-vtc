<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'reviewParameter.title' | translate }}</h1>
    <p>{{ 'reviewParameter.subtitle' | translate }}</p>
  </div>
</div>
<form nz-form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="kasi-form-sections">
    <section class="kasi-form-section">
      <div class="kasi-form-section__aside">
        <h2 class="kasi-form-section__title">{{ 'reviewParameter.section.general.title' | translate }}</h2>
        <p class="kasi-form-section__desc">{{ 'reviewParameter.section.general.desc' | translate }}</p>
      </div>
      <div class="kasi-form-section__body">
        <div class="kasi-form kasi-form--grid">
          <input formControlName="id" type="hidden" hidden>
          <nz-form-item>
            <nz-form-label nzRequired nzFor="title">{{ 'profile.title' | translate }}</nz-form-label>
            <nz-form-control [nzErrorTip]="'error.nameInvalid' | translate">
              <input nz-input formControlName="title" id="title" />
            </nz-form-control>
          </nz-form-item>
          <nz-form-item>
            <nz-form-label nzFor="isGood" nzRequired>{{ 'reviewParameter.isGood' | translate }}</nz-form-label>
            <nz-form-control>
              <nz-switch formControlName="isGood" id="isGood"></nz-switch>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </section>
  </div>
  <div class="kasi-form-page-actions">
    <button nz-button nzType="default" type="button" (click)="cancel()">{{ 'form.cancel' | translate }}</button>
    <button nz-button nzType="primary" type="submit" [disabled]="form.invalid">{{ 'profile.saveChanges' | translate }}</button>
  </div>
</form>
