<nz-page-header [nzGhost]="false" nzBackIcon [nzTitle]="'form.newFleet.title' | translate" [nzSubtitle]="'form.newFleet.subtitle' | translate">
</nz-page-header>
<nz-card style="mt-16">
  <form nz-form #frm [formGroup]="form" (ngSubmit)="submitForm()">
    <nz-form-item>
      <nz-form-label nzRequired nzFor="name">{{ 'profile.name' | translate }}</nz-form-label>
      <nz-form-control [nzErrorTip]="'error.nameInvalid' | translate">
        <input nz-input formControlName="name" id="name" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="phoneNumber" nzRequired>{{ 'profile.phoneNumber' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-input-group [nzAddOnBefore]="addOnBeforeTemplate">
          <ng-template #addOnBeforeTemplate>
            <nz-select formControlName="phoneNumberPrefix" class="phone-select">
              <nz-option *ngFor="let code of countryCodes" [nzLabel]="code.name + ' (' + code.dial_code + ')'"
                [nzValue]="code.dial_code"></nz-option>
            </nz-select>
          </ng-template>
          <nz-input-number formControlName="phoneNumber" id="phoneNumber" class="w-full"></nz-input-number>
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="mobileNumber" nzRequired>{{ 'profile.mobileNumber' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-input-group [nzAddOnBefore]="addOnBeforeTemplate">
          <ng-template #addOnBeforeTemplate>
            <nz-select formControlName="mobileNumberPrefix" class="phone-select">
              <nz-option *ngFor="let code of countryCodes" [nzLabel]="code.name + ' (' + code.dial_code + ')'"
                [nzValue]="code.dial_code"></nz-option>
            </nz-select>
          </ng-template>
          <nz-input-number formControlName="mobileNumber" id="mobileNumber" class="w-full"></nz-input-number>
        </nz-input-group>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="commissionSharePercent">{{ 'profile.commissionPercentage' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-input-number [nzMin]="0" [nzMax]="100" class="w-full" required id="commissionSharePercent"
          formControlName="commissionSharePercent"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="commissionShareFlat">{{ 'profile.commissionFlat' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-input-number [nzMin]="0" [nzMax]="100" required class="w-full" id="commissionShareFlat"
          formControlName="commissionShareFlat"></nz-input-number>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="accountNumber">{{ 'profile.bankAccountInfo' | translate }}</nz-form-label>
      <nz-form-control>
        <input nz-input required id="accountNumber" formControlName="accountNumber">
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="address">{{ 'profile.address' | translate }}</nz-form-label>
      <nz-form-control>
        <input nz-input id="address" formControlName="address">
      </nz-form-control>
    </nz-form-item>
    <button nz-button nzType="primary" type="submit" [disabled]="form.invalid" class="float-right">{{ 'form.register' | translate }}</button>
  </form>
</nz-card>
