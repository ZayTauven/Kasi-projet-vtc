<!-- En-tête de page -->
<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'fleets.title' | translate }}</h1>
    <p>{{ 'fleets.subtitle' | translate }}</p>
  </div>
  <button class="kasi-btn kasi-btn--primary" routerLink="new">
    <i nz-icon nzType="plus"></i>{{ 'profile.add' | translate }}
  </button>
</div>

<!-- Carte tableau -->
<div class="kasi-card">
  <div class="kasi-card__body kasi-card__body--flush">
    @if ((query | async)?.data?.fleets; as fleets) {
      <nz-table #table nzShowSizeChanger [nzFrontPagination]="false"
        [nzData]="fleets.nodes" [nzTotal]="fleets.totalCount"
        (nzQueryParams)="tableService.onTableQueryParamsChange($event)">
        <thead>
          <tr>
            <th nzCustomFilter nzColumnKey="lastName" [nzSortFn]="true">
              {{ 'profile.name' | translate }}
              <nz-filter-trigger [nzActive]="(route.params | async)?.filter?.includes('lastName') === true"
                [nzDropdownMenu]="filtername">
                <i nz-icon nzType="search"></i>
              </nz-filter-trigger>
            </th>
            <th nzCustomFilter nzColumnKey="mobileNumber" [nzSortFn]="true">
              {{ 'profile.mobileNumber' | translate }}
              <nz-filter-trigger [nzActive]="(route.params | async)?.filter?.includes('mobileNumber') === true">
                <i nz-icon nzType="search"></i>
              </nz-filter-trigger>
            </th>
          </tr>
        </thead>
        <tbody>
          @for (data of table.data; track data) {
            <tr [routerLink]="'view/' + data.id" class="group cursor-pointer">
              <td>{{ data.name }}</td>
              <td>{{ data.phoneNumber | phone }}</td>
            </tr>
          }
        </tbody>
      </nz-table>
    }
  </div>
</div>

<nz-dropdown-menu #filtername="nzDropdownMenu">
  <div class="ant-table-filter-dropdown">
    <div class="search-box">
      <input type="text" nz-input placeholder="{{ 'profile.name' | translate }}" [(ngModel)]="nameSearchValue" />
      <button nz-button nzSize="small" nzType="primary" (click)="filter()" class="search-button">
        {{ 'profile.view' | translate }}
      </button>
      <button nz-button nzSize="small" (click)="filter()">{{ 'profile.reset' | translate }}</button>
    </div>
  </div>
</nz-dropdown-menu>
