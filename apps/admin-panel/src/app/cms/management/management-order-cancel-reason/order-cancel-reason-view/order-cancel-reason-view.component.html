<div class="kasi-page-head">
  <div class="kasi-page-head__text">
    <h1 class="kasi-title">{{ 'cancelReason.title' | translate }}</h1>
    <p>{{ 'cancelReason.subtitle' | translate }}</p>
  </div>
</div>
<div class="kasi-card">
  <div class="kasi-card__body">
    <form nz-form class="kasi-form kasi-form--grid" [formGroup]="form" (ngSubmit)="onSubmit()">
    <input formControlName="id" type="hidden" hidden>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="title">{{ 'profile.title' | translate }}</nz-form-label>
      <nz-form-control [nzErrorTip]="'error.titleInvalid' | translate">
        <input nz-input formControlName="title" id="title" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzFor="userType">{{ 'profile.userType' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-select nzMode="default" [nzPlaceHolder]="'profile.pleaseSelect' | translate" formControlName="userType">
          <nz-option [nzLabel]="'profile.driver' | translate" nzValue="Driver"></nz-option>
          <nz-option [nzLabel]="'profile.rider' | translate" nzValue="Rider"></nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label nzRequired nzFor="isEnabled">{{ 'profile.visibilityStatus' | translate }}</nz-form-label>
      <nz-form-control>
        <nz-switch required id="isEnabled" formControlName="isEnabled"></nz-switch>
      </nz-form-control>
    </nz-form-item>
    </form>
    <div class="kasi-form-actions">
      <button nz-button nzType="primary" [disabled]="form.invalid" (click)="onSubmit()">{{'profile.submit' |
        translate}}</button>
    </div>
  </div>
</div>
