<nz-page-header
      [nzGhost]="false"
      nzBackIcon
      [nzTitle]="'serviceCategory.title' | translate"
      [nzSubtitle]="'serviceCategory.subtitle' | translate">
    </nz-page-header>
    <nz-card>
      <form nz-form [formGroup]="form" (ngSubmit)="onSubmit()">
        <nz-form-item>
          <nz-form-label nzRequired nzFor="name">{{ 'profile.name' | translate }}</nz-form-label>
          <nz-form-control [nzErrorTip]="'error.nameInvalid' | translate">
            <input nz-input formControlName="name" id="name" />
          </nz-form-control>
        </nz-form-item>
        <button nz-button class="float-right" nzType="primary" [disabled]="form.invalid">{{ 'profile.save' | translate }}</button>
      </form>
    </nz-card>
    <nz-card class="mt-2" [nzTitle]="'profile.dangerArea' | translate" *ngIf="this.form.value?.id !== null">
      <div>
        <p class="text-lg leading-6 font-medium text-gray-900">{{ 'profile.delete' | translate }}</p>
        <p class="mt-2 max-w-xl text-sm text-gray-500">{{ 'profile.deleteNotice' | translate }}</p>
        <button nz-button nzDanger class="mt-2" (click)="deleteCategory()">{{ 'profile.delete' | translate }}</button>
      </div>
    </nz-card>
