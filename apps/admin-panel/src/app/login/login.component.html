<div class="full-screen page-content">
  <nz-card class="w-[500px] flex flex-col items-center justify-center">
    <img class="ml-[20px]" src="./assets/logo-kasi-blue.png" alt="" />
    <div class="text-wrapper">
      <h1 class="title-text">{{ 'login.title' | translate }}</h1>
    </div>
    <form
      nz-form
      [formGroup]="validateForm"
      class="login-form w-[600px]"
      (ngSubmit)="submitForm()"
    >
      <nz-form-item>
        <nz-form-control [nzErrorTip]="'login.usernameRequired' | translate">
          <nz-input-group nzPrefixIcon="user">
            <input
              type="text"
              nz-input
              formControlName="userName"
              placeholder="{{ 'login.username' | translate }}"
            />
          </nz-input-group>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control>
          <nz-input-group
            nzPrefixIcon="lock"
            [nzSuffix]="passwordSuffixTemplate"
          >
            <input
              [type]="passwordVisible ? 'text' : 'password'"
              nz-input
              formControlName="password"
              placeholder="{{ 'form.password' | translate }}"
            />
          </nz-input-group>
          <ng-template #passwordSuffixTemplate>
            <i
              nz-icon
              [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
              (click)="passwordVisible = !passwordVisible"
            ></i>
          </ng-template>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control>
          <!--label nz-checkbox formControlName="remember">
            <span>Remember me</span>
          </label-->
          <button
            nz-button
            class="login-form-button"
            nzType="primary"
            (click)="onLogin()"
            [disabled]="!validateForm.valid"
          >
            {{ 'login.submit' | translate }}
          </button>
        </nz-form-control>
      </nz-form-item>
    </form>
  </nz-card>
</div>
