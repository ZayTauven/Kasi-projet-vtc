# Kasi — admin-panel (Angular SPA statique)
#
# Sert uniquement les fichiers buildes de l Angular SPA. Ne doit JAMAIS
# proxifier vers un autre service : le reverse-proxy applicatif (routes
# /admin-api/, /driver-api/, /rider-api/) vit dans le service `nginx`
# racine (voir app-ridy/.nginx/default.conf), pas ici.
#
# Ce fichier etait auparavant une copie de .nginx/default.conf, ce qui
# faisait boucler ce conteneur sur lui-meme (son propre `location /`
# proxifiait vers admin-panel:80, c est-a-dire lui-meme) -> 502 "upstream
# sent too big header" des que X-Forwarded-For grossissait a chaque tour.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2
        application/wasm;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-XSS-Protection       "0" always;

    # Fichiers de build Angular nommes avec un hash de contenu (ex: main.<hash>.js) :
    # l URL change des que le contenu change, donc cache long et immuable sans risque.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html et les traductions i18n gardent la MEME URL a chaque build/deploiement
    # (pas de hash) : sans directive explicite, les navigateurs appliquent un cache
    # heuristique et peuvent servir une version perimee apres un redeploiement (vecu :
    # anciennes cles de traduction/anciens tokens Mapbox affiches malgre un rebuild reussi).
    # no-cache force une revalidation (ETag/Last-Modified) a chaque requete.
    location ^~ /assets/i18n/ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # Fallback SPA : toute route Angular (client-side routing) retombe sur index.html
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
