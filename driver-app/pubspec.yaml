name: kasi_driver
description: Driver application of Kasi

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.5.11+172

environment:
  sdk: ^3.0.5
  flutter: ^3.10.5

dependencies:
  collection: ^1.17.1
  country_code_picker: ^3.0.0
  country_codes: ^3.3.0
  dotted_line: ^3.2.2
  equatable: ^2.0.5
  file_picker: ^8.1.4
  firebase_analytics: 12.4.5
  firebase_app_check: ^0.4.5+2
  firebase_auth: 6.5.6
  firebase_core: 4.12.1
  firebase_crashlytics: 5.2.6
  firebase_messaging: 16.4.3
  fl_chart: ^0.63.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_chat_types: ^3.6.2
  flutter_chat_ui: ^1.6.9
  flutter_map: ^8.3.1
  flutter_map_animations: ^0.10.0
  flutter_map_location_marker: ^10.2.0
  flutter_svg: ^2.0.7
  flutter_vector_icons: ^2.0.0
  geolocator: ^14.0.3
  google_fonts: ^6.3.3
  google_maps_flutter: ^2.4.0
  graphql_flutter: ^5.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  intl: ^0.20.2
  json_annotation: ^4.8.0
  latlong2: ^0.10.1
  lifecycle: ^0.7.0
  map_launcher: ^3.5.0
  meta: ^1.3.0
  modal_bottom_sheet: 3.0.0-pre
  package_info_plus: ^9.0.0 # bumped from ^4.0.2, forced by geolocator ^14.0.3 -> geolocator_linux (pinned 0.2.4, see override below) -> package_info_plus ^9.0.0
  pinput: ^2.3.0
  share_plus: ^7.0.2
  shimmer: ^3.0.0
  timeago_flutter: ^3.5.0
  url_launcher: ^6.1.12
  client_shared:
    path: ../libs/client-shared
  flutter_ringtone_player: ^4.0.0+4
  maps_toolkit: ^2.0.1

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^2.0.1
  flutter_gen_runner: ^5.3.1
  json_serializable: ^6.14.0
  graphql_codegen: ^3.0.1

dependency_overrides:
  modal_bottom_sheet: 3.0.0-pre
  http: ^1.1.0
  watcher: ^1.1.1
  latlong2: 0.10.1 # flutter_map_animations 0.10.0 still pins latlong2 ^0.9.1 (has not
  # bumped its constraint yet), which blocks resolving latlong2 ^0.10.1 declared above.
  # Verified via latlong2's CHANGELOG (0.10.0/0.10.1): purely additive/internal changes
  # (LatLng.hashCode improvement, safer fromJson via num cast, new LatLng.isValid getter)
  # -- no removed/renamed public API, so flutter_map_animations' actual usage (LatLng
  # construction/fields only) remains valid. flutter_map 8.3.1 itself already accepts
  # latlong2 >=0.9.1 <0.11.0. Remove this override once flutter_map_animations bumps its
  # latlong2 constraint upstream.
  # Transitive deps incompatible with Dart 3.11.4/Flutter 3.41.6, bumped to the
  # closest patch version that fixes the incompatibility (see KASI_DECISIONS.md).
  win32: 5.5.4 # via file_picker ^5.3.3 (constraint: win32 ^5.0.2)
  flutter_hooks: 0.18.6 # via graphql_flutter ^5.1.3 (constraint: flutter_hooks ^0.18.2)
  flutter_plugin_android_lifecycle: 2.0.34 # via file_picker ^5.3.3 (constraint: ^2.0.9), old v1 embedding removed
  google_maps_flutter_android: 2.14.11 # via google_maps_flutter ^2.4.0 (constraint: ^2.1.10), old v1 embedding removed
  url_launcher_android: 6.3.10 # via url_launcher ^6.1.12 (constraint: ^6.0.13), old v1 embedding removed
  path_provider_android: 2.2.10 # via path_provider (transitive, constraint: ^2.0.6), old v1 embedding removed
  geolocator_linux: 0.2.4 # via geolocator ^14.0.3 (constraint: ^0.2.6);
  # geolocator_linux >=0.2.5 requires package_info_plus ^10.0.0, which itself
  # requires win32 ^6.0.1 -- a breaking rewrite that shatters file_picker's and
  # share_plus's win32-5.x-based Windows implementations (both get compiled
  # even for Android builds: geolocator_linux/package_info_plus/file_picker's
  # "Windows" Dart sources are NOT excluded from non-Windows targets -- Dart
  # can only gate conditional exports on dart.library.js_interop (web) vs
  # native, not on OS, and dart:ffi/dart:io are available on Android too).
  # Confirmed by trial: pinning geolocator_linux to 0.1.3 (package_info_plus
  # >=1.4.2 <5.0.0, matches the untouched-at-the-time package_info_plus
  # ^4.0.2) still failed the Android debug build with a DIFFERENT error --
  # 0.1.3's geoclue_x.dart omits the `altitudeAccuracy` param required by the
  # `Position` constructor in the newer geolocator_platform_interface ^4.2.3
  # pulled in by geolocator ^14.0.3. 0.2.4 is the oldest geolocator_linux
  # version that both (a) provides `altitudeAccuracy` and (b) keeps
  # package_info_plus in the ^9.0.0 range (win32 ^5.5.3, still compatible
  # with the existing win32 5.5.4 override below -- no win32 bump needed).
  # package_info_plus itself bumped ^4.0.2 -> ^9.0.0 above to match. Remove
  # this override once flutter_map_location_marker (and thus win32 5.x
  # consumers) are bumped in a future palier and this override becomes moot.

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter.
flutter:
  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - images/
    - ionicons/
    - google_fonts/

flutter_intl:
  enabled: true

flutter_gen:
  integrations:
    flutter_svg: true
