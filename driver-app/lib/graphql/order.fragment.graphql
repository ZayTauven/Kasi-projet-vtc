fragment Point on Point {
  lat
  lng
}
fragment AvailableOrder on Order {
  id
  status
  currency
  costBest
  addresses
  providerShare
  distanceBest
  durationBest
  packageSize
  recipientName
  recipientMobileNumber
  deliveryInstructions
  directions {
    ...Point
  }
  options {
    name
    icon
  }
  service {
    name
    orderType
  }
  points {
    ...Point
  }
}

fragment CurrentOrder on Order {
  id
  createdOn
  expectedTimestamp
  status
  currency
  costBest
  costAfterCoupon
  destinationArrivedTo
  paidAmount
  etaPickup
  tipAmount
  directions {
    ...Point
  }
  points {
    ...Point
  }
  service {
    name
    orderType
  }
  options {
    id
    name
    icon
  }
  addresses
  packageSize
  recipientName
  recipientMobileNumber
  deliveryInstructions
  rider {
    mobileNumber
    firstName
    lastName
    media {
      address
    }
    wallets {
      currency
      balance
    }
  }
  driverLastSeenMessagesAt
  conversation {
    sentAt
  }
}

fragment historyOrderItem on OrderConnection {
  edges {
    node {
      id
      status
      createdOn
      currency
      costAfterCoupon
      providerShare
      service {
        name
      }
    }
  }
  pageInfo {
    hasNextPage
    endCursor
    startCursor
    hasPreviousPage
  }
}

fragment ChatMessage on OrderMessage {
  id
  content
  sentByDriver
}

fragment ChatDriver on Driver {
  id
  firstName
  lastName
  media {
    address
  }
}

fragment ChatRider on Rider {
  id
  firstName
  lastName
  media {
    address
  }
}

fragment BasicProfile on Driver {
  mobileNumber
  firstName
  lastName
  searchDistance
  media {
    address
  }
  softRejectionNote
  status
  currentOrders {
    ...CurrentOrder
  }
  wallet {
    balance
    currency
  }
  isWalletHidden
}

fragment DriverMedia on Media {
  id
  address
}
